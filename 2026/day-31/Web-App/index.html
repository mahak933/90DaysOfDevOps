<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Nginx Site</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; }
    header { background: #0ea5e9; color: white; padding: 2rem 1.5rem; }
    main { padding: 1.5rem; max-width: 800px; margin: auto; }
    h1 { margin: 0 0 .5rem 0; }
    footer { text-align: center; color: #64748b; padding: 2rem 1rem; }
    .card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  </style>
</head>
<body>
  <header>
    <h1>🚀 Hello from Nginx on Docker</h1>
    <p>Deployed using <strong>nginx:alpine</strong>.</p>
  </header>
  <main>
    <div class="card">
      <h2>It works!</h2>
      <p>This is a small static site served by Nginx inside a Docker container.</p>
      <ul>
        <li>Base image: <code>nginx:alpine</code></li>
        <li>Document root: <code>/usr/share/nginx/html</code></li>
        <li>Exposed port in container: <code>80</code></li>
      </ul>
    </div>
  </main>
  <footer>
    <p>© 2026 My Website</p>
  </footer>
</body>
</html>
